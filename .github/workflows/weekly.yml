name: Weekly Stock Screener

on:
  schedule:
    # Monday 06:00 UTC = Monday 10:00 AM Dubai (GST = UTC+4)
    - cron: '0 6 * * 1'
  # Lets you click "Run workflow" in GitHub UI anytime (useful for testing)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
     FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        env:
          FINNHUB_API_KEY:   ${{ secrets.FINNHUB_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python screener.py

      - name: Commit and push updated HTML
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Weekly update: $(date +'%Y-%m-%d')"
          git push
